<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Nepal Tourism Forecast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161c25;
      --bg3: #1e2530;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --text: #e8e6df;
      --muted: #8b8982;
      --red: #c94040;
      --red-light: #e86060;
      --gold-light: #f0c96a;
      --teal: #3a8e7a;
      --teal-light: #56b89f;
      --font-serif: "DM Serif Display", Georgia, serif;
      --font-body: "Instrument Sans", system-ui, sans-serif;
      --font-mono: "DM Mono", ui-monospace, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 440px);
    }

    .intro {
      position: relative;
      overflow: hidden;
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid var(--border);
    }

    .intro::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 80% at 80% 45%, rgba(201, 64, 64, 0.09), transparent 70%),
        radial-gradient(ellipse 45% 65% at 20% 82%, rgba(58, 142, 122, 0.08), transparent 70%);
    }

    .intro::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image:
        linear-gradient(var(--text) 1px, transparent 1px),
        linear-gradient(90deg, var(--text) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .intro-inner {
      position: relative;
      max-width: 640px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      position: relative;
      z-index: 1;
    }

    .emblem {
      width: 34px;
      height: 34px;
      background: var(--red);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    .brand-title {
      font-family: var(--font-serif);
      font-size: 19px;
      line-height: 1.1;
    }

    .brand-sub,
    .eyebrow,
    label {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow {
      display: inline-block;
      border: 1px solid rgba(201, 64, 64, 0.35);
      border-radius: 2px;
      color: var(--red-light);
      margin-bottom: 18px;
      padding: 4px 10px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(42px, 6vw, 68px);
      font-weight: 400;
      line-height: 1.04;
      letter-spacing: 0;
      margin-bottom: 18px;
    }

    h1 em {
      color: var(--gold-light);
    }

    .intro p {
      color: var(--muted);
      max-width: 520px;
      font-size: 15px;
    }

    .auth-panel {
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
    }

    .card {
      width: 100%;
      max-width: 390px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(13, 17, 23, 0.38);
      padding: 24px;
    }

    .card h2 {
      font-family: var(--font-serif);
      font-size: 30px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .card p {
      color: var(--muted);
      margin-bottom: 20px;
    }

    form {
      display: grid;
      gap: 13px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg3);
      color: var(--text);
      outline: none;
      padding: 10px 11px;
    }

    input:focus {
      border-color: rgba(86, 184, 159, 0.55);
    }

    .primary-btn,
    .ghost-btn {
      min-height: 40px;
      border: 1px solid var(--border2);
      border-radius: 3px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      padding: 9px 13px;
    }

    .primary-btn {
      background: var(--teal);
      color: white;
    }

    .ghost-btn {
      background: transparent;
      color: var(--text);
      margin-top: 10px;
      width: 100%;
    }

    .message {
      min-height: 20px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
    }

    .message.error {
      color: var(--red-light);
    }

    .link-row {
      color: var(--muted);
      font-size: 13px;
      margin-top: 16px;
    }

    .link-row a {
      color: var(--teal-light);
      font-weight: 700;
    }

    @media (max-width: 820px) {
      .auth-page {
        grid-template-columns: 1fr;
      }

      .intro {
        min-height: 360px;
        padding: 28px 22px;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .auth-panel {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="intro">
      <a class="brand" href="index.html">
        <span class="emblem" aria-hidden="true"></span>
        <span>
          <span class="brand-title">Nepal Tourism Forecast</span>
          <span class="brand-sub">Foreign arrivals dashboard</span>
        </span>
      </a>

      <div class="intro-inner">
        <span class="eyebrow">Secure API access</span>
        <h1>Welcome <br><em>back</em>.</h1>
        <p>Login to request forecasts, load saved model metrics, and keep your dashboard session active in this browser.</p>
      </div>
    </section>

    <section class="auth-panel">
      <div class="card">
        <h2>Login</h2>
        <p>Use your registered account to continue.</p>

        <form id="loginForm">
          <div class="field">
            <label for="apiBase">API base URL</label>
            <input id="apiBase" value="http://localhost:5000">
          </div>
          <div class="field">
            <label for="username">Username</label>
            <input id="username" autocomplete="username" placeholder="testuser" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="password123" required>
          </div>
          <button class="primary-btn" type="submit">Login</button>
        </form>

        <div class="message" id="message"></div>
        <a class="ghost-btn" href="index.html">Back to Dashboard</a>
        <div class="link-row">No account yet? <a href="register.html">Create one</a>.</div>
      </div>
    </section>
  </main>

  <script>
    const apiBaseInput = document.getElementById("apiBase");
    const message = document.getElementById("message");
    apiBaseInput.value = localStorage.getItem("tourism_api_base") || apiBaseInput.value;

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
    }

    function apiBase() {
      return apiBaseInput.value.replace(/\/+$/, "");
    }

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      localStorage.setItem("tourism_api_base", apiBase());
      setMessage("Logging in...");

      try {
        const response = await fetch(`${apiBase()}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value.trim()
          })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `Login failed: ${response.status}`);

        localStorage.setItem("tourism_token", data.token);
        localStorage.setItem("tourism_username", data.username);
        setMessage("Login successful. Opening dashboard...");
        window.location.href = "index.html";
      } catch (error) {
        setMessage(error.message, true);
      }
    });
  </script>
</body>
</html>
